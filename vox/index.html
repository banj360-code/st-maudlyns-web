<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Electronic Confessional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>The Electronic Confessional</h1>
        <p class="subtitle">Reverend Bassette will see you now.</p>

        <div id="bishop-container" style="display:none;">
            <img id="bishop-body" src="../images/bishop-body.png" alt="Reverend Body">
            <img id="bishop-jaw" src="../images/bishop-jaw.png" alt="Reverend Jaw">
        </div>

        <form id="confession-form">
            <textarea id="confession" placeholder="Confess your sins, my child... (e.g., 'I skipped church for football' or 'I voted Tory')" required></textarea>
            <br>
            <button type="submit" id="submit-btn">Seek Absolution</button>
        </form>

        <div id="result" class="result-box"></div>
    </div>

    <script>
    document.getElementById("confession-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const confession = document.getElementById("confession").value;
        const resultDiv = document.getElementById("result");
        const submitBtn = document.getElementById("submit-btn");
        const bishopContainer = document.getElementById("bishop-container");
        const bishopJaw = document.getElementById("bishop-jaw");

        // 1. UI Loading State
        resultDiv.innerText = "The Reverend is contemplating your sins...";
        resultDiv.style.opacity = "1";
        submitBtn.disabled = true;
        submitBtn.innerText = "Praying...";

        try {
            // 2. Fetch TEXT ONLY from Netlify (Fast!)
            const response = await fetch('/.netlify/functions/the-reverend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ confession })
            });

            const data = await response.json();

            if (response.status === 200) {
                resultDiv.innerText = data.absolution;
                
                // 3. Show the Bishop
                bishopContainer.style.display = "block";

                // 4. Browser Speech Logic
                const synth = window.speechSynthesis;
                
                // Cancel any previous speech to avoid overlap
                if (synth.speaking) synth.cancel();

                const utterance = new SpeechSynthesisUtterance(data.absolution);

                // --- VOICE SELECTION (The "British Hunt") ---
                let voices = synth.getVoices();
                
                // Function to pick the best "Reverend" voice
                function setVoice() {
                    // Try to find "Google UK English Male" or similar specific ones first
                    let selectedVoice = voices.find(v => v.name.includes("Google UK English Male")) || 
                                      voices.find(v => v.name.includes("Daniel")); // Good Mac voice

                    // If not found, look for any 'en-GB' (British) voice
                    if (!selectedVoice) {
                        selectedVoice = voices.find(v => v.lang === 'en-GB' || v.lang === 'en_GB');
                    }

                    // Fallback: any voice (better than silence)
                    if (selectedVoice) utterance.voice = selectedVoice;
                }

                // Chrome loads voices asynchronously, so we might need to wait
                if (voices.length === 0) {
                    synth.onvoiceschanged = () => {
                        voices = synth.getVoices();
                        setVoice();
                    };
                } else {
                    setVoice();
                }

                // Tweak pitch/rate for "Vicar" vibes
                utterance.pitch = 0.8; // Slightly deeper
                utterance.rate = 0.9;  // Slightly slower, more stern

                // --- THE ANIMATION (Word Boundary Method) ---
                // The jaw opens when a word starts, closes shortly after.
                utterance.onboundary = (event) => {
                    if (event.name === 'word') {
                        // Snap open
                        bishopJaw.style.transform = "translateY(8px)";
                        
                        // Snap shut after 150ms (simulates syllabic speech)
                        setTimeout(() => {
                            bishopJaw.style.transform = "translateY(0px)";
                        }, 150);
                    }
                };

                // Cleanup when finished
                utterance.onend = () => {
                    bishopJaw.style.transform = "translateY(0px)";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Seek Absolution";
                };

                // SPEAK!
                synth.speak(utterance);

            } else {
                throw new Error(data.absolution || "The Reverend remains silent.");
            }

        } catch (error) {
            console.error("Error:", error);
            resultDiv.innerText = "The Reverend is indisposed. (Error: " + error.message + ")";
            submitBtn.disabled = false;
            submitBtn.innerText = "Try Again";
        }
    });
</script>
</body>
</html>
